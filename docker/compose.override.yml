# Development overrides - hot reload friendly, optional local tools
# docker compose -f docker/compose.yml -f docker/compose.override.yml --profile dev up

services:
  nginx:
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"

  web:
    # Dev-only: run as root so the app can write to the bind-mounted
    # ./web/data directory on Windows/WSL hosts. Production keeps USER node.
    user: root
    environment:
      NODE_ENV: development
    volumes:
      - ./web/data:/app/data
      # Mount app source so role consoles update without image rebuild
      - ./web/server.js:/app/server.js
      - ./web/lib:/app/lib
      - ./web/config:/app/config
      - ./web/public:/app/public

  api:
    environment:
      APP_ENV: local

  ai-service:
    environment:
      FLASK_ENV: development
    ports:
      - "127.0.0.1:${AI_DEBUG_PORT:-5001}:5000"

  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"

  minio:
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: rms-mailpit
    profiles:
      - dev
    networks:
      - rms_app
    ports:
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  rms_minio_data:
    name: rms_minio_data
