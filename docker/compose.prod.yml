# Production overrides - hardened runtime, public HTTPS
# docker compose -f docker/compose.yml -f docker/compose.prod.yml up -d

services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

  web:
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - rms_web_data:/app/data
      - rms_web_uploads:/app/uploads
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  api:
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    environment:
      APP_ENV: production
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  ai-service:
    read_only: true
    tmpfs:
      - /tmp
    environment:
      FLASK_ENV: production
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  postgres:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  redis:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
